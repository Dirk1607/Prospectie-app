<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prospectie-tool is verhuisd</title>
  <meta name="robots" content="noindex">
  <!-- Automatische doorverwijzing naar de Offerte-app (Prospecten-tab) -->
  <meta http-equiv="refresh" content="3; url=https://offerte.thenextlevel.consulting/#prospecten">
  <style>
    :root{ --navy:#1B3A6B; --orange:#E8812A; }
    *{ box-sizing:border-box; }
    body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--navy); color:#fff; padding:24px; }
    .kaart{ max-width:460px; text-align:center; background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.18); border-radius:16px; padding:34px 30px; }
    img{ height:40px; margin-bottom:18px; background:#fff; border-radius:8px; padding:6px 10px; }
    h1{ font-size:21px; margin:0 0 10px; }
    p{ font-size:15px; line-height:1.5; color:rgba(255,255,255,.82); margin:0 0 22px; }
    a.knop{ display:inline-block; background:var(--orange); color:#fff; text-decoration:none;
      font-weight:600; padding:12px 22px; border-radius:9px; }
    a.knop:hover{ filter:brightness(1.05); }
    .klein{ font-size:12px; color:rgba(255,255,255,.5); margin-top:20px; }
  </style>
</head>
<body>
  <div class="kaart">
    <img src="LogoNextLevel_FINAAL.jpg" alt="The Next Level">
    <h1>De Prospectie-tool is verhuisd</h1>
    <p>Prospecten, mails en het gedeelde adresboek zitten nu in de <b>Offerte-app</b>, onder het tabblad <b>Prospecten</b>. Je wordt automatisch doorgestuurd&hellip;</p>
    <a class="knop" href="https://offerte.thenextlevel.consulting/#prospecten">Ga naar de Offerte-app</a>
    <div class="klein">Word je niet doorgestuurd? Klik dan op de knop hierboven.</div>
  </div>
  <script>
    // Directe doorverwijzing (naast de meta-refresh als vangnet).
    setTimeout(function(){ location.replace('https://offerte.thenextlevel.consulting/#prospecten'); }, 1200);
  </script>
</body>
</html>
